<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Create Election | MCS25</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Create New Election</h1>
        <form id="election-form">
            <div class="form-group">
                <label for="post">Position / Post:</label>
                <input type="text" id="post" name="post" placeholder="e.g. Class Representative" required>
            </div>
            <div id="candidates-container">
                <label>Candidates:</label>
                <div class="candidate-input">
                    <input type="text" name="candidate" placeholder="Candidate Name" required>
                </div>
                <div class="candidate-input">
                    <input type="text" name="candidate" placeholder="Candidate Name" required>
                </div>
            </div>
            <button type="button" id="add-candidate">Add Another Candidate</button>
            <button type="submit">Create Election</button>
        </form>
        <div id="message"></div>
        <a href="/dashboard">Back to Dashboard</a>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/voting-admin.js"></script>
</body>
</html>
