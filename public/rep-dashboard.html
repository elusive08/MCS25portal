<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rep Dashboard - Dept Portal</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Dept Portal</div>
            <ul id="nav-links">
                <li><a id="welcome-msg"></a></li>
                <li><a onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="dashboard-grid">
            <section id="sidebar">
                <div class="auth-form" style="width:100%; margin-bottom:2rem">
                    <h3>Post News</h3>
                    <form id="post-news-form">
                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" name="title" required>
                        </div>
                        <div class="form-group">
                            <label>Content</label>
                            <textarea name="content" required></textarea>
                        </div>
                        <div class="form-group">
                            <label>Image (Optional)</label>
                            <input type="file" name="image" accept="image/*">
                        </div>
                        <button type="submit">Post News</button>
                    </form>
                </div>
                <div class="auth-form" style="width:100%">
                    <h3>Upload PDF</h3>
                    <form id="upload-resource-form">
                        <div class="form-group">
                            <label>Course Name</label>
                            <input type="text" name="courseName" required>
                        </div>
                        <div class="form-group">
                            <label>PDF File</label>
                            <input type="file" name="pdf" accept="application/pdf" multiple required>
                        </div>
                        <button type="submit">Upload PDF</button>
                    </form>
                </div>
            </section>
            <section>
                <div id="news-section">
                    <h2>Latest News</h2>
                    <div id="news-list">Loading news...</div>
                </div>
                <div id="resources-section" style="margin-top:2rem">
                    <h2>Course Materials (PDFs)</h2>
                    <div id="resources-list">Loading resources...</div>
                </div>
            </section>
        </div>
    </main>

    <script src="js/dashboard.js"></script>
</body>
</html>
